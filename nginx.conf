# AI 智库企业咨询平台 - Nginx 配置文件
# Windows 环境部署说明：
# 1. 放置在 Nginx 配置目录 (如：C:\nginx\conf\)
# 2. 文件名为：ai-think-tank.conf
# 3. 在 nginx.conf 的 http {} 块中添加：include ai-think-tank.conf;

server {
    listen 80;
    server_name localhost;
    
    # 字符集设置
    charset utf-8;
    
    # 日志配置
    access_log logs/ai-think-tank-access.log;
    error_log logs/ai-think-tank-error.log;
    
    # =====================================
    # 根路径重定向到管理后台
    # =====================================
    location = / {
        return 302 /admin;
    }
    
    # =====================================
    # API 接口反向代理（优先级最高）
    # =====================================
    location /api/ {
        proxy_pass http://localhost:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # =====================================
    # Swagger 文档（生产环境已禁用）
    # =====================================
    # location /swagger-ui/ {
    #     proxy_pass http://localhost:8080/swagger-ui/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }
    
    # location /v3/api-docs {
    #     proxy_pass http://localhost:8080/v3/api-docs;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }
    
    # =====================================
    # 静态文件和前端页面处理
    # =====================================
    location / {
        # 开发模式：直接访问项目静态文件目录（带.html 后缀支持）
        root E:/aiWorks/service_ai_assistant/src/main/resources/static;
        try_files $uri $uri/ $uri.html @backend;
        
        # 部署模式：所有请求转发给 Tomcat（使用时取消下面注释，并注释掉上面的 root 和 try_files）
        # proxy_pass http://localhost:8080;
        # proxy_set_header Host $host;
        # proxy_set_header X-Real-IP $remote_addr;
        # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    # 后端代理（兜底）
    location @backend {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    # =====================================
    # 安全配置
    # =====================================
    location ~ /\. {
        deny all;
    }
    
    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;
}
