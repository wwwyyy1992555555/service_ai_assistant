# AI 智库企业咨询平台 - Nginx 配置文件
# Windows 环境部署说明：
# 1. 放置在 Nginx 配置目录 (如：C:\nginx\conf\)
# 2. 文件名为：ai-think-tank.conf
# 3. 在 nginx.conf 的 http {} 块中添加：include ai-think-tank.conf;

server {
    listen 80;
    server_name localhost;  # 如果有域名，替换为实际域名
    
    # 字符集设置
    charset utf-8;
    
    # 日志配置（Windows 路径）
    access_log logs/ai-think-tank-access.log;
    error_log logs/ai-think-tank-error.log;
    
    # =====================================
    # 根路径自动跳转到管理后台
    # =====================================
    location = / {
        # 访问根路径时重定向到管理后台（带.html 后缀）
        return 302 /admin.html;
    }
    
    # =====================================
    # 管理后台页面（带.html 和不带.html 都支持）
    # =====================================
    location = /admin {
        # 重定向到带.html 的路径
        return 301 /admin.html;
    }
    
    location = /admin.html {
        proxy_pass http://localhost:8080/admin.html;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # =====================================
    # 聊天页面（带.html 和不带.html 都支持）
    # =====================================
    location = /chat {
        # 重定向到带.html 的路径
        return 301 /chat.html;
    }
    
    location = /chat.html {
        proxy_pass http://localhost:8080/chat.html;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # =====================================
    # 登录页面（带.html 和不带.html 都支持）
    # =====================================
    location = /login {
        # 重定向到带.html 的路径
        return 301 /login.html;
    }
    
    location = /login.html {
        proxy_pass http://localhost:8080/login.html;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # =====================================
    # 其他前端静态资源配置
    # =====================================
    location / {
        # 代理到 Tomcat，提供静态文件和前端页面
        proxy_pass http://localhost:8080;
        
        # 传递真实客户端信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # =====================================
    # API 接口反向代理
    # =====================================
    location /api/ {
        # 代理到 Spring Boot 应用（默认 8080 端口）
        # 注意：proxy_pass 末尾不要加 /，否则会把 /api/ 前缀去掉导致 404
        proxy_pass http://localhost:8080/api/;

        # 传递真实客户端信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 缓冲区设置
        proxy_buffer_size 4k;
        proxy_buffers 4 32k;
        proxy_busy_buffers_size 64k;
    }
    
    # =====================================
    # Swagger API 文档
    # =====================================
    location /swagger-ui/ {
        proxy_pass http://localhost:8080/swagger-ui/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    location /v3/api-docs {
        proxy_pass http://localhost:8080/v3/api-docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    # =====================================
    # WebSocket 支持（如果需要）
    # =====================================
    location /ws/ {
        proxy_pass http://localhost:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    # =====================================
    # 文件上传下载
    # =====================================
    location /uploads/ {
        # 代理到后端，由 Tomcat/Spring Boot 处理文件访问
        proxy_pass http://localhost:8080/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # 文件上传大小限制（根据需要调整）
        client_max_body_size 100M;
    }
    
    # =====================================
    # 安全配置
    # =====================================
    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
    
    # 禁止访问备份文件
    location ~ ~$ {
        deny all;
    }
    
    # =====================================
    # Gzip 压缩
    # =====================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;
    gzip_disable "MSIE [1-6]\.";
}
