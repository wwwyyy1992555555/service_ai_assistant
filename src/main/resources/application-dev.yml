# =====================================
# AI 智库企业咨询平台 - 开发环境配置
# =====================================

server:
  port: 8080
  tomcat:
    uri-encoding: UTF-8

spring:
  application:
    name: ai-think-tank
  
  # 数据库初始化配置（禁用 Spring Boot 自动执行）
  sql:
    init:
      mode: never
      # continue-on-error: false
  
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_think_tank?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000 
  
  # Redis 配置
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
    timeout: 5000ms
    # Redis 5.0 使用 Lettuce 连接池
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms
  
  # Jackson 配置（JSON 序列化）
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB
  
  # 静态资源配置（禁用缓存，开发环境使用）
  web:
    resources:
      cache-period: 0
      static-locations: classpath:/static/
  
  # Devtools 热部署配置
  devtools:
    restart:
      enabled: false  # 禁用热部署，加快启动速度
    livereload:
      enabled: false

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.myproject.service_ai_assistant.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Knife4j (Swagger) 配置
knife4j:
  enable: true
  setting:
    language: zh-CN

# 日志配置
logging:
  level:
    root: WARN
    com.myproject.service_ai_assistant: INFO
    org.springframework.web: WARN
    com.baomidou.mybatisplus: WARN
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'
  charset:
    console: UTF-8
    file: UTF-8
  file:
    name: logs/ai-think-tank.log
    max-size: 10MB
    max-history: 30
    total-size-cap: 100MB

# AI 模型配置（以文心一言为例）
ai:
  platform: wenxin  # wenxin | tongyi | openai
  wenxin:
    api-key: your-api-key-here
    secret-key: your-secret-key-here
  tongyi:
    api-key: your-api-key-here
  openai:
    api-key: your-api-key-here
    base-url: https://api.openai.com/v1
