# =====================================
# AI 智库企业咨询平台 - 开发环境配置
# =====================================

server:
  port: 8080
  tomcat:
    uri-encoding: UTF-8

spring:
  application:
    name: ai-think-tank
  
  # 禁用 Redis 自动配置（当 app.redis.enabled=false 时）
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  
  # 数据库初始化配置（禁用 Spring Boot 自动执行）
  sql:
    init:
      mode: never
      # continue-on-error: false
  
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_think_tank?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 50
      max-wait: 60000
      # 连接超时和回收配置
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false 
  
  # Redis 配置（可选）
  data:
    redis:
      # 是否启用 Redis（true=启用，false=禁用）
      enabled: false
      host: localhost
      port: 6379
      password: 
      database: 0
      timeout: 5000ms
      # Redis 5.0 使用 Lettuce 连接池
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 60000ms
  
  # Jackson 配置（JSON 序列化）
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB
  
  # 静态资源配置（禁用缓存，开发环境使用）
  web:
    resources:
      cache-period: 0
      static-locations: classpath:/static/
  
  # 添加资源处理器，禁用缓存
  mvc:
    static-path-pattern: /**
  
  # Devtools 热部署配置
  devtools:
    restart:
      enabled: false  # 禁用热部署，加快启动速度
    livereload:
      enabled: false

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.myproject.service_ai_assistant.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Knife4j (Swagger) 配置
knife4j:
  enable: true
  setting:
    language: zh-CN

# 日志配置
logging:
  level:
    root: WARN
    com.myproject.service_ai_assistant: INFO
    org.springframework.web: WARN
    com.baomidou.mybatisplus: WARN

# 大模型配置(可选)
app:
  llm:
    # 是否启用大模型(true=启用,false=关闭)
    enabled: true
    # 大模型服务商(目前支持:aliyun, baidu, kimi, zhipu)
    provider: zhipu
    # API Key(从服务商获取)
    api-key: ${LLM_API_KEY:086732e37f814fbc88673bfbf3de9312.PuYogwojyujj8yQr}
    # API Secret(从服务商获取,智谱不需要)
    api-secret: ${LLM_API_SECRET:}
    # 模型名称(glm-4-flash-250414最快免费,qwen-turbo低价)
    model: glm-4-flash-250414
    # API地址(根据服务商配置对应地址)
    api-url: https://open.bigmodel.cn/api/paas/v4/chat/completions
    # 超时时间(秒)
    timeout: 30
    # 是否使用知识库增强(true=基于知识库回答,false=自由回答)
    knowledge-enhanced: true


# 数据清理任务配置（开发环境）
data:
  cleanup:
    # 是否启用定期清理（true=启用，false=禁用）
    # 开发环境建议先禁用，测试完成后再启用
    enabled: true
    # 保留最近 N 个月的数据（默认 6 个月）
    retention-months: 3
    # 定时任务执行时间（Cron 表达式）
    # 开发环境可设置为每小时执行一次进行测试
    # cron: 0 0 * * * ?
    # 默认：每天凌晨 2 点执行
    cron: 0 0 2 * * ?
