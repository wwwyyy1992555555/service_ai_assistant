# =====================================
# AI 智库企业咨询平台 - 验收环境配置
# =====================================

server:
  port: 8080
  tomcat:
    uri-encoding: UTF-8
    # 连接超时配置
    connection-timeout: 20000
    # 最大线程数
    max-threads: 200
    # 最小空闲线程数
    min-spare-threads: 10

spring:
  application:
    name: ai-think-tank
  
  # 禁用 Redis 自动配置（当 app.redis.enabled=false 时）
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://uat-mysql:3306/ai_think_tank?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    druid:
      # 连接池配置（验收环境优化）
      initial-size: 10
      min-idle: 10
      max-active: 50
      max-wait: 30000
      # 连接超时
      connect-timeout: 10000
      socket-timeout: 60000
      # 空闲连接回收
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      # 健康检查
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      validation-query: SELECT 1
  
  # Jackson 配置（JSON 序列化）
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 200MB
  
  # 静态资源配置（验收环境启用缓存）
  web:
    resources:
      cache-period: 3600  # 1 小时缓存
      static-locations: classpath:/static/
  
  # MVC 配置
  mvc:
    static-path-pattern: /**

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.myproject.service_ai_assistant.entity
  configuration:
    map-underscore-to-camel-case: true
    # 验收环境关闭 SQL 日志
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Knife4j (Swagger) 配置
knife4j:
  enable: true
  setting:
    language: zh-CN
    # 验收环境启用文档
    swagger-model-name: 实体类列表
    swagger-api-exclude: false

# 日志配置
logging:
  level:
    root: WARN
    com.myproject.service_ai_assistant: INFO
    org.springframework.web: INFO
    com.baomidou.mybatisplus: WARN
    org.apache.catalina: INFO
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'
  charset:
    console: UTF-8
    file: UTF-8
  file:
    name: logs/ai-think-tank-uat.log
    max-size: 50MB
    max-history: 15
    total-size-cap: 500MB

# 应用配置
app:
  # 系统名称
  name: AI 智库企业咨询平台（验收环境）
  version: 1.0.0
  
  # 多租户配置
  tenant:
    enabled: true
    default-id: 1
  
  # JWT Token 配置
  jwt:
    secret: ${JWT_SECRET:uat-secret-key-change-in-production}
    expire-time: 86400000  # 24 小时
  
  # 文件存储路径
  upload:
    path: /data/uat/uploads/ai-think-tank
    domain: ${UPLOAD_DOMAIN:http://uat-server:8080}
  
  # 大模型配置
  llm:
    # 验收环境建议启用
    enabled: ${LLM_ENABLED:false}
    provider: ${LLM_PROVIDER:aliyun}
    api-key: ${LLM_API_KEY:}
    api-secret: ${LLM_API_SECRET:}
    model: ${LLM_MODEL:qwen-turbo}
    timeout: 60
    knowledge-enhanced: true
  
  # Redis 配置
  redis:
    enabled: ${REDIS_ENABLED:false}
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0
    timeout: 5000

# 数据清理任务配置
data:
  cleanup:
    # 验收环境启用定期清理
    enabled: true
    retention-months: 12  # 保留 12 个月数据
    cron: 0 0 3 * * ?  # 每天凌晨 3 点执行

# 健康检查配置（Spring Boot Actuator）
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
  health:
    db:
      enabled: true
    redis:
      enabled: false
