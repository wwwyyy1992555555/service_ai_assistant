# =====================================
# AI 智库企业咨询平台 - 主配置文件
# =====================================

spring:
  application:
    name: ai-think-tank
  profiles:
    active: dev
  # Redis 配置（Spring Boot 3.x 推荐格式）
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# 通用配置
app:
  # 系统名称
  name: AI 智库企业咨询平台
  version: 1.0.0
  
  # 多租户配置
  tenant:
    enabled: true
    # 默认租户 ID（演示用）
    default-id: 1
    
  # JWT Token 配置
  jwt:
    secret: your-secret-key-here-ai-think-tank-2024
    expire-time: 86400000  # 24 小时

  # 文件存储路径
  upload:
    path: /data/uploads/ai-think-tank
    domain: http://localhost:8080
  
  # 大模型配置（可选）
  llm:
    # 是否启用大模型（true=启用，false=关闭）
    enabled: false
    # 大模型服务商（目前支持：aliyun, baidu, kimi）
    provider: aliyun
    # API Key（从服务商获取）
    api-key: ${LLM_API_KEY:}
    # API Secret（从服务商获取）
    api-secret: ${LLM_API_SECRET:}
    # 模型名称
    model: qwen-turbo
    # 超时时间（秒）
    timeout: 30
    # 是否使用知识库增强（true=基于知识库回答，false=自由回答）
    knowledge-enhanced: true

# 数据清理任务配置
data:
  cleanup:
    # 是否启用定期清理（true=启用，false=禁用）
    enabled: false
    # 保留最近 N 个月的数据（默认 6 个月）
    retention-months: 6
    # 定时任务执行时间（Cron 表达式）
    # 默认：每天凌晨 2 点执行
    cron: 0 0 2 * * ?
