<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>问题体检与反馈管理 - AI 智能助手管理后台</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .page-header {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .page-title {
            font-size: 24px;
            font-weight: 600;
            margin: 0 0 10px 0;
        }
        
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .stat-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 600;
            color: #1890ff;
        }
        
        .stat-card.danger .stat-value {
            color: #f5222d;
        }
        
        .stat-card.success .stat-value {
            color: #52c41a;
        }
        
        .content-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .feedback-reason {
            display: inline-block;
            background: #f5f5f5;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            margin-right: 6px;
            margin-bottom: 6px;
        }
        
        .satisfaction-stars {
            color: #f7ba2a;
            font-size: 18px;
        }
        
        .low-satisfaction {
            color: #f5222d;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- 页面标题 -->
        <div class="page-header">
            <h1 class="page-title">📊 问题体检与反馈管理</h1>
            <p style="color: #666; margin: 0;">收集用户反馈，持续优化知识库质量</p>
        </div>
        
        <!-- 统计卡片 -->
        <div class="stats-cards">
            <div class="stat-card">
                <div class="stat-label">总反馈数</div>
                <div class="stat-value">{{ stats.totalFeedbacks || 0 }}</div>
            </div>
            <div class="stat-card danger">
                <div class="stat-label">待处理反馈</div>
                <div class="stat-value">{{ stats.pendingCount || 0 }}</div>
            </div>
            <div class="stat-card success">
                <div class="stat-label">平均满意度</div>
                <div class="stat-value">{{ stats.avgSatisfaction || '0.00' }}<span style="font-size: 16px;">星</span></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">好评率</div>
                <div class="stat-value">{{ positiveRate }}%</div>
            </div>
        </div>
        
        <!-- 反馈原因 TOP10 -->
        <div class="content-box" style="margin-bottom: 20px;">
            <h2 style="margin-top: 0; font-size: 18px;">📋 反馈原因 TOP10</h2>
            <div v-if="stats.topReasons && stats.topReasons.length > 0">
                <div v-for="(item, index) in stats.topReasons" :key="index" 
                     style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0;">
                    <span>{{ index + 1 }}. {{ item.key }}</span>
                    <el-tag size="small">{{ item.value }} 次</el-tag>
                </div>
            </div>
            <el-empty v-else description="暂无反馈数据"></el-empty>
        </div>
        
        <!-- 待处理反馈列表 -->
        <div class="content-box">
            <h2 style="margin-top: 0; font-size: 18px;">⚠️ 待处理反馈</h2>
            <el-table :data="pendingFeedbacks" style="width: 100%" v-loading="loading">
                <el-table-column prop="createdTime" label="反馈时间" width="180"></el-table-column>
                <el-table-column label="满意度" width="120">
                    <template #default="{ row }">
                        <span class="satisfaction-stars" :class="{'low-satisfaction': row.satisfaction <= 2}">
                            {{ '⭐'.repeat(row.satisfaction) }}{{ '☆'.repeat(5 - row.satisfaction) }}
                        </span>
                    </template>
                </el-table-column>
                <el-table-column prop="userId" label="用户 ID" width="150"></el-table-column>
                <el-table-column label="反馈原因" min-width="300">
                    <template #default="{ row }">
                        <div v-if="row.feedbackReasons">
                            <span v-for="(reason, idx) in parseReasons(row.feedbackReasons)" 
                                  :key="idx" class="feedback-reason">{{ reason }}</span>
                        </div>
                        <span v-else style="color: #999;">未填写</span>
                    </template>
                </el-table-column>
                <el-table-column prop="userSuggestion" label="用户建议" min-width="250" show-overflow-tooltip></el-table-column>
                <el-table-column label="操作" width="150" fixed="right">
                    <template #default="{ row }">
                        <el-button type="primary" size="small" @click="handleProcess(row)">处理</el-button>
                    </template>
                </el-table-column>
            </el-table>
        </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <script src="https://unpkg.com/element-plus/dist/locale/zh-cn.min.js"></script>

    <script>
        const { createApp, ref, reactive, computed, onMounted } = Vue;
        const API_BASE_URL = 'http://localhost:8080/api';

        createApp({
            setup() {
                const stats = ref({});
                const pendingFeedbacks = ref([]);
                const loading = ref(false);

                const positiveRate = computed(() => {
                    if (!stats.value.satisfactionDistribution) return '0.00';
                    const dist = stats.value.satisfactionDistribution;
                    const total = Object.values(dist).reduce((a, b) => a + b, 0);
                    if (total === 0) return '0.00';
                    const positive = (dist[4] || 0) + (dist[5] || 0);
                    return ((positive / total) * 100).toFixed(2);
                });

                const loadStatistics = async () => {
                    try {
                        const response = await fetch(`${API_BASE_URL}/consult/feedback/statistics`);
                        const result = await response.json();
                        if (result.code === 200) {
                            stats.value = result.data;
                        }
                    } catch (error) {
                        console.error('加载统计数据失败:', error);
                    }
                };

                const loadPendingFeedbacks = async () => {
                    loading.value = true;
                    try {
                        const response = await fetch(`${API_BASE_URL}/consult/feedback/pending?limit=20`);
                        const result = await response.json();
                        if (result.code === 200) {
                            pendingFeedbacks.value = result.data;
                        }
                    } catch (error) {
                        console.error('加载待处理反馈失败:', error);
                    } finally {
                        loading.value = false;
                    }
                };

                const handleProcess = (feedback) => {
                    ElementPlus.ElMessageBox.prompt('请输入处理备注', '处理反馈', {
                        confirmButtonText: '确定',
                        cancelButtonText: '取消',
                        inputPlaceholder: '例如：已优化相关知识库内容'
                    }).then(async ({ value }) => {
                        try {
                            const response = await fetch(`${API_BASE_URL}/consult/feedback/process/${feedback.id}`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                                body: `remark=${encodeURIComponent(value)}&processor=admin`
                            });
                            const result = await response.json();
                            if (result.code === 200) {
                                ElementPlus.ElMessage.success('处理成功');
                                loadPendingFeedbacks();
                                loadStatistics();
                            } else {
                                ElementPlus.ElMessage.error(result.message || '处理失败');
                            }
                        } catch (error) {
                            console.error('处理反馈失败:', error);
                            ElementPlus.ElMessage.error('处理失败');
                        }
                    });
                };

                const parseReasons = (reasonsJson) => {
                    try {
                        return JSON.parse(reasonsJson);
                    } catch (e) {
                        return [];
                    }
                };

                onMounted(() => {
                    loadStatistics();
                    loadPendingFeedbacks();
                });

                return {
                    stats,
                    pendingFeedbacks,
                    loading,
                    positiveRate,
                    handleProcess,
                    parseReasons
                };
            }
        }).use(ElementPlus, { locale: ElementPlusLocaleZhCn }).mount('#app');
    </script>
</body>
</html>
