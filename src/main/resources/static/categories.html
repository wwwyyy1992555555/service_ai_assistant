<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分类管理 - AI 智库</title>
    
    <!-- 样式文件 -->
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/modules/categories.css">
    
    <!-- 关键：v-cloak 必须内联且优先加载，防止页面闪烁 -->
    <style>
        [v-cloak] { display: none !important; }
    </style>
    <style>
        body { background: transparent; margin: 0; padding: 20px; }
        html, body { height: 100%; overflow: auto; }
    </style>
</head>
<body class="module-page">
    <div id="app" class="app-container" v-cloak>
        <div class="table-container">
            <div class="table-header" style="padding: 16px 24px; border-bottom: 2px solid #f0f0f0; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between;">
                <div class="table-title" style="color: #262626; font-size: 16px; font-weight: 600;">📂 分类管理</div>
                <div class="toolbar" style="display: flex; gap: 12px; align-items: center;">
                    <el-button type="primary" @click="showAddCategoryDialog">
                        <el-icon><plus /></el-icon> 新增分类
                    </el-button>
                </div>
            </div>
            
            <el-table :data="categoryList" :height="tableHeight" stripe style="width: 100%" v-loading="loading">
                <el-table-column prop="id" label="编号" width="80">
                    <template #default="scope">{{ scope.row.id }}</template>
                </el-table-column>
                <el-table-column prop="categoryName" label="分类名称" min-width="300">
                    <template #default="scope">
                        <span style="color: #409eff; font-weight: 500;">{{ scope.row.categoryName }}</span>
                    </template>
                </el-table-column>
                <el-table-column label="操作" width="200" fixed="right" align="center">
                    <template #default="scope">
                        <el-button type="primary" size="small" @click.stop="editCategory(scope.row)">编辑</el-button>
                        <el-button type="danger" size="small" @click.stop="deleteCategory(scope.row.id)">删除</el-button>
                    </template>
                </el-table-column>
            </el-table>
        </div>
        
        <!-- 编辑对话框 -->
        <el-dialog 
            v-model="dialogVisible" 
            :title="editingCategory.id ? '编辑分类' : '新增分类'" 
            width="600px"
        >
            <el-form :model="editingCategory" label-width="100px">
                <el-form-item label="分类名称" required>
                    <el-input v-model="editingCategory.categoryName" placeholder="请输入分类名称"></el-input>
                </el-form-item>
            </el-form>
            <template #footer>
                <el-button @click="dialogVisible = false">取消</el-button>
                <el-button type="primary" @click="saveCategory">保存</el-button>
            </template>
        </el-dialog>
    </div>

    <!-- 脚本文件 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <script src="https://unpkg.com/element-plus/dist/locale/zh-cn.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/modules/categories-page.js"></script>
</body>
</html>
