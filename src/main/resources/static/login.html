<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AI 智库管理平台</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <link rel="stylesheet" href="css/login.css">
    <!-- 关键：v-cloak 必须内联且优先加载，防止页面闪烁 -->
    <style>
        [v-cloak] { display: none !important; }
    </style>
</head>
<body>
    <div id="app" v-cloak>
        <div class="login-container">
            <div class="login-box">
                <div class="login-header">
                    <div class="logo">🤖</div>
                    <h1>AI 智库管理平台</h1>
                    <p>欢迎登录</p>
                </div>

                <div class="login-form">
                    <div class="form-item">
                        <el-select
                            v-model="loginForm.loginType"
                            placeholder="请选择登录类型"
                            size="large"
                            style="width: 100%;"
                        >
                            <el-option label="租户登录" value="tenant"></el-option>
                            <el-option label="超级管理员" value="super"></el-option>
                        </el-select>
                    </div>

                    <div class="form-item" v-if="loginForm.loginType === 'tenant'">
                        <el-input
                            v-model="loginForm.tenantCode"
                            placeholder="请输入租户编码"
                            size="large"
                            clearable
                        ></el-input>
                    </div>

                    <div class="form-item">
                        <el-input
                            v-model="loginForm.username"
                            placeholder="请输入用户名"
                            prefix-icon="User"
                            size="large"
                            clearable
                            :class="{ 'input-error': errors.username }"
                            @input="clearError('username')"
                        ></el-input>
                        <div class="error-text" v-if="errors.username">{{ errors.username }}</div>
                    </div>

                    <div class="form-item">
                        <el-input
                            v-model="loginForm.password"
                            type="password"
                            placeholder="请输入密码"
                            prefix-icon="Lock"
                            size="large"
                            show-password
                            @keyup.enter="handleLogin"
                            :class="{ 'input-error': errors.password }"
                            @input="clearError('password')"
                        ></el-input>
                        <div class="error-text" v-if="errors.password">{{ errors.password }}</div>
                    </div>

                    <el-button
                        type="primary"
                        :loading="loading"
                        @click="handleLogin"
                        size="large"
                        class="login-button"
                    >
                        {{ loading ? '登录中...' : '登 录' }}
                    </el-button>
                </div>
            </div>

            <div class="login-footer">
                <p>© 2026 AI 智库管理平台 版权所有</p>
            </div>
        </div>
    </div>

    <!-- 引入 Vue 和 Element Plus（使用和 admin.html 相同的 CDN） -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <script src="https://unpkg.com/element-plus/dist/locale/zh-cn.min.js"></script>
    
    <!-- 引入 API 封装（包含 login 函数） -->
    <script src="js/api.js"></script>
    
    <!-- 登录逻辑 -->
    <script>
        const { createApp } = Vue;

        // 检查 Vue 是否加载
        if (typeof Vue === 'undefined') {
            document.getElementById('app').innerHTML = '<div style="padding:50px;text-align:center;"><h2 style="color:red;">❌ 资源加载失败，请检查网络</h2><button onclick="location.reload()" style="padding:10px 30px;margin-top:20px;">刷新</button></div>';
        } else {
            console.log('✅ Vue 已加载');
        }

        const app = createApp({
            setup() {
                const loginForm = Vue.reactive({
                    loginType: 'tenant',
                    tenantCode: '',
                    username: '',
                    password: ''
                });

                const errors = Vue.reactive({
                    username: '',
                    password: ''
                });

                const loading = Vue.ref(false);

                // 清除错误信息
                const clearError = (field) => {
                    errors[field] = '';
                };

                // 处理登录
                const handleLogin = async () => {
                    // 清空错误
                    errors.username = '';
                    errors.password = '';

                    // 简单验证
                    if (!loginForm.username) {
                        errors.username = '请输入用户名';
                        return;
                    }
                    if (!loginForm.password) {
                        errors.password = '请输入密码';
                        return;
                    }
                    if (loginForm.password.length < 6) {
                        errors.password = '密码长度至少 6 位';
                        return;
                    }

                    loading.value = true;

                    try {
                        // 方案一：(tenant_id, username) 联合唯一，必须传 tenantId
                        const result = await window.login(
                            loginForm.username,
                            loginForm.password,
                            loginForm.tenantCode || '',
                            loginForm.loginType
                        );

                        if (result.code === 200 && result.data) {
                            const userData = result.data;
                            
                            // 保存用户信息和 Token
                            localStorage.setItem('user', JSON.stringify(userData));
                            localStorage.setItem('token', userData.token);
                            
                            // 【新增】保存租户配置到 localStorage（如果后端返回了）
                            if (userData.tenantThemeColor || userData.tenantLogoUrl || userData.tenantWelcomeMessage) {
                                const tenantConfig = {
                                    themeColor: userData.tenantThemeColor || '#1890ff',
                                    logoUrl: userData.tenantLogoUrl || '',
                                    welcomeMessage: userData.tenantWelcomeMessage || '您好，请问有什么可以帮您？'
                                };
                                localStorage.setItem('tenantConfig', JSON.stringify(tenantConfig));
                            }

                            ElementPlus.ElMessage.success('登录成功！');

                            setTimeout(() => {
                                window.location.href = '/admin.html';
                            }, 500);
                        } else {
                            ElementPlus.ElMessage.error(result.message || '登录失败');
                        }
                    } catch (error) {
                        console.error('登录失败:', error);
                        ElementPlus.ElMessage.error(error.message || '网络错误，请稍后重试');
                    } finally {
                        loading.value = false;
                    }
                };

                return {
                    loginForm,
                    errors,
                    loading,
                    handleLogin,
                    clearError
                };
            }
        });

        // 使用 Element Plus 和中文语言包
        app.use(ElementPlus, { locale: ElementPlusLocaleZhCn });
        app.mount('#app');
    </script>
</body>
</html>
