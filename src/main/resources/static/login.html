<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AI 智库管理平台</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <link rel="stylesheet" href="css/login.css">
    <!-- 关键：v-cloak 必须内联且优先加载，防止页面闪烁 -->
    <style>
        [v-cloak] { display: none !important; }
    </style>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        .login-tips {
            margin-top: 15px;
            padding: 10px;
            background-color: #f0f9eb;
            border-radius: 4px;
            font-size: 13px;
            color: #67c23a;
        }
        .login-tips span {
            margin-right: 15px;
        }
        /* 完全自定义表单样式 */
        .login-form {
            width: 360px;
            margin: 0 auto;
        }
        .form-item {
            width: 360px;
            margin-bottom: 24px;
            position: relative;
        }
        /* 强制输入框固定宽度 */
        .form-item .el-input {
            width: 360px !important;
        }
        .form-item .el-input__wrapper {
            width: 360px !important;
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: 0 0 0 1px #dcdfe6 inset;
            transition: box-shadow 0.2s;
        }
        .form-item .el-input__wrapper:hover {
            box-shadow: 0 0 0 1px #c0c4cc inset;
        }
        .form-item .el-input__wrapper.is-focus {
            box-shadow: 0 0 0 1px #409eff inset;
        }
        .form-item .el-input__inner {
            width: 100%;
        }
        /* 错误状态 */
        .form-item.input-error .el-input__wrapper {
            box-shadow: 0 0 0 1px #f56c6c inset;
        }
        /* 错误信息 */
        .error-text {
            color: #f56c6c;
            font-size: 12px;
            margin-top: 4px;
            position: absolute;
            top: 100%;
            left: 0;
        }
        /* 登录按钮 */
        .login-button {
            width: 360px;
            height: 44px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div id="app" v-cloak>
        <div class="login-container">
            <div class="login-box">
                <div class="login-header">
                    <div class="logo">🤖</div>
                    <h1>AI 智库管理平台</h1>
                    <p>欢迎登录</p>
                </div>

                <div class="login-form">
                    <div class="form-item">
                        <el-input
                            v-model="loginForm.username"
                            placeholder="请输入用户名"
                            prefix-icon="User"
                            size="large"
                            clearable
                            :class="{ 'input-error': errors.username }"
                        ></el-input>
                        <div class="error-text" v-if="errors.username">{{ errors.username }}</div>
                    </div>

                    <div class="form-item">
                        <el-input
                            v-model="loginForm.password"
                            type="password"
                            placeholder="请输入密码"
                            prefix-icon="Lock"
                            size="large"
                            show-password
                            @keyup.enter="handleLogin"
                            :class="{ 'input-error': errors.password }"
                        ></el-input>
                        <div class="error-text" v-if="errors.password">{{ errors.password }}</div>
                    </div>

                    <el-button
                        type="primary"
                        :loading="loading"
                        @click="handleLogin"
                        size="large"
                        class="login-button"
                    >
                        {{ loading ? '登录中...' : '登 录' }}
                    </el-button>
                </div>
            </div>

            <div class="login-footer">
                <p>© 2026 AI 智库管理平台 版权所有</p>
            </div>
        </div>
    </div>

    <!-- 引入 Vue 和 Element Plus（使用和 admin.html 相同的 CDN） -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <script src="https://unpkg.com/element-plus/dist/locale/zh-cn.min.js"></script>
    
    <!-- 登录逻辑 -->
    <script>
        const { createApp } = Vue;

        // 检查 Vue 是否加载
        if (typeof Vue === 'undefined') {
            document.getElementById('app').innerHTML = '<div style="padding:50px;text-align:center;"><h2 style="color:red;">❌ 资源加载失败，请检查网络</h2><button onclick="location.reload()" style="padding:10px 30px;margin-top:20px;">刷新</button></div>';
        } else {
            console.log('✅ Vue 已加载');
        }

        const app = createApp({
            setup() {
                const loginForm = Vue.reactive({
                    username: '',
                    password: ''
                });

                const errors = Vue.reactive({
                    username: '',
                    password: ''
                });

                const loading = Vue.ref(false);
                const loginFormRef = Vue.ref(null);

                const handleLogin = async () => {
                    // 清空错误
                    errors.username = '';
                    errors.password = '';

                    // 简单验证
                    if (!loginForm.username) {
                        errors.username = '请输入用户名';
                        return;
                    }
                    if (!loginForm.password) {
                        errors.password = '请输入密码';
                        return;
                    }
                    if (loginForm.password.length < 6) {
                        errors.password = '密码长度至少 6 位';
                        return;
                    }

                    loading.value = true;

                    try {
                        const response = await fetch('/api/auth/login', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                username: loginForm.username,
                                password: loginForm.password,
                                tenantId: 1
                            })
                        });

                        const result = await response.json();

                        if (result.code === 200 && result.data) {
                            const userData = result.data;
                            localStorage.setItem('user', JSON.stringify(userData));
                            localStorage.setItem('token', userData.token);

                            ElementPlus.ElMessage.success('登录成功！');

                            setTimeout(() => {
                                window.location.href = '/admin.html';
                            }, 500);
                        } else {
                            ElementPlus.ElMessage.error(result.message || '登录失败');
                        }
                    } catch (error) {
                        console.error('登录失败:', error);
                        ElementPlus.ElMessage.error('网络错误，请稍后重试');
                    } finally {
                        loading.value = false;
                    }
                };

                return {
                    loginForm,
                    errors,
                    loading,
                    handleLogin
                };
            }
        });

        // 使用 Element Plus 和中文语言包
        app.use(ElementPlus, { locale: ElementPlusLocaleZhCn });
        app.mount('#app');
    </script>
</body>
</html>
