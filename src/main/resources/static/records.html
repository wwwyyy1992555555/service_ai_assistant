<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对话记录 - AI 智库</title>
    
    <!-- 样式文件 -->
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/modules/records.css">
    
    <!-- 关键：v-cloak 必须内联且优先加载，防止页面闪烁 -->
    <style>
        [v-cloak] { display: none !important; }
    </style>
    <style>
        body { background: transparent; margin: 0; padding: 20px; }
        html, body { height: 100%; overflow: auto; }
    </style>
</head>
<body class="module-page">
    <div id="app" class="app-container" v-cloak>
        <div class="table-container">
            <div class="table-header" style="padding: 16px 24px; border-bottom: 2px solid #f0f0f0; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between;">
                <div class="table-title" style="color: #262626; font-size: 16px; font-weight: 600;">💬 对话记录</div>
                <div class="toolbar" style="display: flex; gap: 12px; align-items: center;">
                    <el-input
                        v-model="searchKeyword"
                        placeholder="搜索问题、用户姓名或手机号"
                        style="width: 400px;"
                        clearable
                        @clear="handleClearSearch"
                        @keyup.enter="handleSearch"
                    >
                        <template #append>
                            <el-button @click="handleSearch">
                                <el-icon><search /></el-icon> 搜索
                            </el-button>
                        </template>
                    </el-input>
                </div>
            </div>
            
            <el-table :data="recordsList" :height="tableHeight" stripe style="width: 100%" v-loading="loading" :empty-text="searchKeyword && searchKeyword.trim() ? '' : undefined"
                      :row-style="{ cursor: 'pointer' }"
                      @row-click="viewRecordDetail">
                <el-table-column prop="userName" label="姓名" width="100">
                    <template #default="scope">
                        <span v-if="scope.row.userName" style="font-weight: 500; color: #262626;">{{ scope.row.userName }}</span>
                        <span v-else style="color: #999; font-size: 12px;">匿名</span>
                    </template>
                </el-table-column>
                <el-table-column prop="userPhone" label="手机号" width="120">
                    <template #default="scope">
                        <span v-if="scope.row.userPhone">{{ scope.row.userPhone }}</span>
                        <span v-else style="color: #999; font-size: 12px;">-</span>
                    </template>
                </el-table-column>
                <el-table-column prop="question" label="问题" min-width="250" show-overflow-tooltip>
                    <template #default="scope">
                        <span style="color: #409eff;">{{ scope.row.question }}</span>
                    </template>
                </el-table-column>
                <el-table-column prop="answer" label="回答" min-width="300" show-overflow-tooltip>
                    <template #default="scope">
                        <div style="color: #606266; line-height: 1.6;">{{ scope.row.answer }}</div>
                    </template>
                </el-table-column>
                <el-table-column prop="satisfaction" label="满意度" width="140" align="center">
                    <template #default="scope">
                        <el-rate 
                            v-if="scope.row.satisfaction" 
                            :model-value="scope.row.satisfaction" 
                            :colors="['#99A9BF', '#F7BA2A', '#F7BA2A']"
                            size="small"
                            disabled
                        />
                        <span v-else style="color: #999;">-</span>
                    </template>
                </el-table-column>
                <el-table-column label="时间" width="160" align="center">
                    <template #default="scope">
                        <div style="color: #606266; font-size: 13px;">{{ formatTime(scope.row.createdTime) }}</div>
                    </template>
                </el-table-column>
                <el-table-column label="操作" width="150" fixed="right" align="center">
                    <template #default="scope">
                        <el-button type="danger" size="small" @click.stop="deleteRecord(scope.row)">删除</el-button>
                    </template>
                </el-table-column>
            </el-table>
            
            <div style="padding: 16px; display: flex; justify-content: flex-end; align-items: center; gap: 16px;">
                <el-pagination
                    v-model:current-page="pageCurrent"
                    v-model:page-size="pageSize"
                    :page-sizes="[10, 20, 50, 100]"
                    :total="pageTotal"
                    layout="total, sizes, prev, pager, next, jumper"
                    @size-change="handleSizeChange"
                    @current-change="handleCurrentChange"
                />
            </div>
        </div>
        
        <!-- 详情对话框 -->
        <el-dialog v-model="detailVisible" title="对话详情" width="900px" class="record-detail-dialog">
            <div v-if="selectedRecord.sessionHistory && selectedRecord.sessionHistory.length > 0">
                <el-descriptions :column="2" border style="margin-bottom: 20px;">
                    <el-descriptions-item label="会话 ID">{{ selectedRecord.sessionId }}</el-descriptions-item>
                    <el-descriptions-item label="创建时间">{{ formatTime(selectedRecord.createdTime) }}</el-descriptions-item>
                    <el-descriptions-item label="用户信息">
                        <span v-if="selectedRecord.userName">{{ selectedRecord.userName }}</span>
                        <span v-if="selectedRecord.userPhone">&nbsp;&nbsp;{{ selectedRecord.userPhone }}</span>
                        <span v-if="!selectedRecord.userName && !selectedRecord.userPhone">匿名用户</span>
                    </el-descriptions-item>
                    <el-descriptions-item label="满意度">
                        <el-rate 
                            v-if="selectedRecord.satisfaction" 
                            :model-value="selectedRecord.satisfaction" 
                            :colors="['#99A9BF', '#F7BA2A', '#F7BA2A']"
                            size="small"
                            disabled
                        />
                        <span v-else style="color: #999;">未评价</span>
                    </el-descriptions-item>
                </el-descriptions>
                
                <el-timeline>
                    <el-timeline-item 
                        v-for="(record, index) in selectedRecord.sessionHistory" 
                        :key="index" 
                        :timestamp="formatTime(record.createdTime)"
                        placement="top">
                        <el-card>
                            <div style="margin-bottom: 12px;">
                                <el-tag type="info" size="small">用户</el-tag>
                                <div style="margin-top: 8px; color: #262626;">{{ record.question }}</div>
                            </div>
                            <div>
                                <el-tag type="success" size="small">AI 助手</el-tag>
                                <div style="margin-top: 8px; color: #606266; line-height: 1.6;">{{ record.answer }}</div>
                            </div>
                        </el-card>
                    </el-timeline-item>
                </el-timeline>
            </div>
            <div v-else style="text-align: center; padding: 40px; color: #909399;">
                暂无对话记录
            </div>
        </el-dialog>
    </div>

    <!-- 脚本文件 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <script src="https://unpkg.com/element-plus/dist/locale/zh-cn.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/modules/records-page.js"></script>
</body>
</html>
